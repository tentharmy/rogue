name: AI Review

permissions:
  contents: read
  pull-requests: write

env:
  OPENAI_MODEL: gpt-5-mini
  MAX_DIFF_BYTES: 100000

on:
  pull_request:
    branches:
      - main

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout pull request
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Create pull request diff
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          git diff "$BASE_SHA" "$HEAD_SHA" > pull-request.diff

          diff_size="$(wc -c < pull-request.diff)"
          echo "Diff size: $diff_size bytes"
          echo "Changed lines: $(wc -l < pull-request.diff)"

          if [ "$diff_size" -gt "$MAX_DIFF_BYTES" ]; then
            {
              echo "AI review skipped."
              echo
              echo "The pull request diff is ${diff_size} bytes,"
              echo "which exceeds the ${MAX_DIFF_BYTES} byte limit."
            } > review.md
            echo "skip_ai_review=true" >> "$GITHUB_ENV"
            echo "skip_extract_ai_review=true" >> "$GITHUB_ENV"
          fi

      - name: Check PR comments
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          PR_NUBMER: ${{ github.event.pull_request.number }}
        run: |
            gh api repos/$REPOSITORY/issues/$PR_NUMBER/comments | jr .

      - name: Request AI Review
#        if: env.skip_ai_review != 'true'
        if: false
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          {
          cat <<'PROMPT'
          You are reviewing a pull request for GoRogue, a game written in Go.

          Review only the supplied diff.

          Do not report:
          - formatting issues;
          - problems already reliably detected by gofmt, go vet,
            or golangci-lint;
          - subjective style preferences.

          Look for:
          - behavioral bugs;
          - incorrect error handling;
          - broken invariants;
          - architecture and dependency problems;
          - unnecessary complexity;
          - missing tests for meaningful behavior.

          Be precise. Reference filenames and changed lines where possible.
          If there are no meaningful findings, say so explicitly.

          Pull request diff:
          PROMPT

          cat pull-request.diff
          } > review-input.txt

          jq -n \
            --rawfile input review-input.txt \
            --arg model "$OPENAI_MODEL" \
            '{
              model: $model,
              input: $input
            }' > request.json

          set +e
          http_status="$(curl --silent --show-error \
            --write-out "%{http_code}" \
            --output response.json \
            https://api.openai.com/v1/responses \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            --data-binary @request.json)"
          curl_exit=$?
          set -e

          if [ "$curl_exit" -ne 0 ]; then
            {
              echo "AI review failed."
              echo
              echo "The OpenAI API request failed before a valid HTTP"
              echo "response was received."
              echo
              echo "curl exit code: $curl_exit"
            } > review.md
            echo "skip_extract_ai_review=true" >> "$GITHUB_ENV"
          elif [ "$http_status" -lt 200 ] || [ "$http_status" -ge 300 ]; then
            {
              echo "AI review failed."
              echo
              echo "OpenAI API returned HTTP status $http_status."
              echo
              echo '```json'
              head -c 4000 response.json
              echo
              echo '```'
            } > review.md
            echo "skip_extract_ai_review=true" >> "$GITHUB_ENV"
          fi

      - name: Extract AI Review
#        if: env.skip_extract_ai_review != 'true'
        if: false
        run: |
          jq -r '
            .output[]?
            | select(.type == "message")
            | .content[]?
            | select(.type == "output_text")
            | .text
          ' response.json > review.md

          if [ ! -s review.md ]; then
            {
              echo "AI review produced no usable output."
              echo
              echo "Check the workflow logs for the raw OpenAI response."
            } > review.md
          fi

      - name: Publish AI Review
        if: false
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          gh pr comment "$PR_NUMBER" \
            --repo "$REPOSITORY" \
            --body-file review.md
